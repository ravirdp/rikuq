<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-label="prism">
  <!-- Lowercase wordmark. Text uses currentColor so it inherits page color
       (dark mode by default; would work on light too if site adds it).
       Geometric sans fallback chain — Inter when available, system stack otherwise. -->
  <text x="8" y="58"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="56"
        font-weight="700"
        letter-spacing="-2.5"
        fill="currentColor">prism</text>

  <!-- Prism accent: small triangle + 3 spectrum beams emerging right.
       Positioned at end of wordmark as a refraction signature. -->
  <g transform="translate(186, 14)">
    <path d="M 0 44 L 22 0 L 44 44 Z" fill="#7C3AED" />
    <line x1="44" y1="44" x2="56" y2="28" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="44" x2="56" y2="40" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="44" x2="56" y2="52" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="44" x2="50" y2="58" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
