name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PUBLIC_SITE_URL: https://rikuq.com
          PUBLIC_CF_BEACON: 0a002e9d4b924b3a90bc1eafa654701a
          PUBLIC_GA4_MEASUREMENT_ID: G-DV2MSGVH6G
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=rikuq --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # Give Cloudflare a few seconds to propagate the new build before pinging.
      - name: Wait for edge propagation
        run: sleep 20

      - name: Ping IndexNow (Bing / Yandex / Naver / Seznam)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: ./scripts/indexnow.sh
        continue-on-error: true
