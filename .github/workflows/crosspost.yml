name: Auto-crosspost 3 days after publish

# Runs once a day at 10:00 IST (04:30 UTC) and cross-posts any article
# that was added to src/content/blog/ exactly 3 days ago.
#
# - Idempotent: only fires on articles aged exactly 3 days (UTC date diff).
# - Skips drafts (draft: true in frontmatter).
# - Skips articles where `crossposted: true` is set in frontmatter (manual
#   opt-out for things we publish on rikuq but don't want elsewhere).
# - Continues per-platform if one fails (so a Dev.to rate-limit doesn't kill
#   the whole batch). Hashnode was removed from the auto-platforms list in
#   May 2026 — paid API only, we publish to Hashnode manually if at all.
#
# Manual trigger also available via workflow_dispatch with a slug input.

on:
  # Re-enabled 2026-05-26 after GSC URL inspection confirmed all priority
  # rikuq.com pages are indexed by Google (verdict: PASS, coverageState:
  # "Submitted and indexed"). Canonical safety is now established; mirror
  # crossposts via Day-3 cron are safe.
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC = 10:00 IST daily
  workflow_dispatch:
    inputs:
      slug:
        description: 'Article slug to crosspost immediately (overrides date check)'
        required: false
        type: string

jobs:
  crosspost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read git log for article ages

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find article to crosspost
        id: pick
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.slug }}" ]; then
            # Manual trigger with explicit slug. Output as `slugs` (plural) so
            # the loop in the crosspost step picks it up. The manual path
            # bypasses the crossposted: true check so this also works for
            # backfilled articles that need a second push.
            slug="${{ github.event.inputs.slug }}"
            echo "Manual trigger for slug: $slug"
            echo "slugs=$slug" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled run: find ALL articles first-committed exactly 3 days ago
          # (we ship up to 2/day now, so a single-match loop drops the second one)
          target_date=$(date -u -d '3 days ago' +%Y-%m-%d)
          echo "Looking for articles first-committed on: $target_date"

          slugs=""
          for f in src/content/blog/*.mdx; do
            base=$(basename "$f" .mdx)
            [ "$base" = "_template" ] && continue

            if grep -q '^draft:\s*true' "$f"; then continue; fi
            if grep -q '^crossposted:\s*true' "$f"; then continue; fi

            first_commit=$(git log --diff-filter=A --follow --format=%cs -- "$f" | tail -1)
            if [ "$first_commit" = "$target_date" ]; then
              slugs="$slugs $base"
              echo "Match: $base (first committed $first_commit)"
            fi
          done

          slugs=$(echo "$slugs" | xargs)  # trim leading whitespace
          if [ -z "$slugs" ]; then
            echo "No articles aged exactly 3 days to crosspost. Exiting cleanly."
          fi
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"

      - name: Crosspost to Dev.to
        if: steps.pick.outputs.slugs != ''
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          # Loop all matched slugs. 40s sleep between them — Dev.to rate-limits aggressively.
          # `|| true` per-slug so one failure (e.g. canonical-already-exists 422)
          # doesn't abort the whole batch.
          failed=0
          for slug in ${{ steps.pick.outputs.slugs }}; do
            echo "::group::Crossposting $slug"
            if ! npm run crosspost -- "$slug"; then
              echo "::warning::Crosspost failed for $slug — continuing batch"
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
            sleep 40
          done
          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed slug(s) failed; review logs."
          fi
