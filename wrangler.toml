name = "rikuq"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Env vars (non-secret) — secrets like BREVO_API_KEY are set in the
# Cloudflare Pages dashboard under Settings → Environment Variables.
# Plain vars live here because the Pages PATCH API silently drops new
# plain_text entries when called externally; wrangler.toml [vars] are
# baked into the deployment, so they always make it through.
[vars]
PUBLIC_SITE_URL = "https://rikuq.com"
PUBLIC_CF_BEACON = "0a002e9d4b924b3a90bc1eafa654701a"
PUBLIC_GA4_MEASUREMENT_ID = "G-DV2MSGVH6G"
BREVO_LIST_ID = "5"
BREVO_DOI_TEMPLATE_ID = "2"
BREVO_REDIRECT_URL = "https://rikuq.com/newsletter/confirmed"

# KV namespace — used by future /tools/picker quiz result permalinks
[[kv_namespaces]]
binding = "QUIZ_RESULTS"
id = "547cc227b4fa42bc99968ee25304121d"

# R2 bucket — used by OG image generation later
[[r2_buckets]]
binding = "OG_IMAGES"
bucket_name = "rikuq-og"
